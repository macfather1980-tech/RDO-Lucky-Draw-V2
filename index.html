<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RDO 配對抽籤系統 V8</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1a73e8">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        /* --- 您原始的 CSS (保持不變) --- */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1000px; margin: 30px auto; padding: 20px; background-color: #f0f2f5; color: #333; }
        .section { background: white; padding: 25px; margin-bottom: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2, h3 { margin-top: 0; color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        .day-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f3f4; }
        .day-row:last-child { border-bottom: none; }
        input[type="text"], input[type="number"], input[type="password"], select { padding: 10px; border: 1px solid #dadce0; border-radius: 6px; outline: none; }
        input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,222,0.2); }
        .btn-group { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { cursor: pointer; padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; transition: all 0.2s; }
        .btn-save { background: #1a73e8; color: white; }
        .btn-draw { background: #34a853; color: white; width: 100%; font-size: 1.2em; padding: 15px; }
        .btn-export { background: #5f6368; color: white; font-size: 0.9em; }
        .btn-import { background: #0079d4; color: white; font-size: 0.9em; }
        .btn-reset { background: #d93025; color: white; font-size: 0.8em; }
        .btn-clear-history { background: #70757a; color: white; font-size: 0.8em; }
        .btn-override { background: #d93025; color: white; }
        .btn-toggle-admin { background: #fbbc04; color: #333; width: 100%; margin-bottom: 10px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .status-item { font-weight: bold; color: #1a73e8; font-size: 1.1em; }
        .quota-exhausted { color: #d93025 !important; font-weight: bold; }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9em; }
        .log-table th, .log-table td { border: 1px solid #eee; padding: 10px; text-align: left; }
        .log-table th { background-color: #f8f9fa; color: #5f6368; }
        .error { color: #d93025; font-weight: bold; margin-top: 15px; font-size: 0.95em; }
        .success { color: #188038; font-weight: bold; margin-top: 15px; padding: 15px; border-radius: 8px; background: #e6f4ea; border: 1px solid #34a853; animation: fadeIn 0.5s; }
        .table-title { font-weight: bold; margin-top: 25px; margin-bottom: 10px; color: #5f6368; display: block; }
        .override-section { border: 2px dashed #d93025; background-color: #fff5f5; }
        .override-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .override-controls div { display: flex; flex-direction: column; gap: 5px; }
        .override-controls select, .override-controls input { width: 100%; box-sizing: border-box; }
        .override-controls .full-width { grid-column: span 2; }
        .parallel-container { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 25px; }
        .parallel-container .section { flex: 1; margin-bottom: 0; }
        @media (max-width: 768px) { .parallel-container { flex-direction: column; gap: 0; } .parallel-container .section { margin-bottom: 25px; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- PWA 自定義安裝按鈕樣式 --- */
        #install-button {
            display: none; 
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: #1a73e8;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(26, 115, 232, 0.4);
            width: 80%;
            max-width: 300px;
            text-align: center;
            cursor: pointer;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }

        /* --- ✨ 優化後的 Bottom Sheet 樣式 ✨ --- */
        #install-modal {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            z-index: 10000;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        #install-modal.active { display: block; transform: translateY(0); }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: block; }
        .install-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .install-icon { width: 56px; height: 56px; background: #1a73e8; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: bold; box-shadow: 0 4px 10px rgba(26,115,232,0.3); }
        .install-content h3 { margin: 0; border: none; padding: 0; font-size: 1.25rem; color: #202124; }
        .install-content p { color: #5f6368; font-size: 0.9rem; line-height: 1.5; margin: 8px 0 20px 0; }
        .install-footer { display: flex; gap: 12px; }
        .btn-install-main { flex: 2; background: #1a73e8; color: white; text-align: center; padding: 14px; border-radius: 30px; font-size: 1rem; }
        .btn-install-secondary { flex: 1; background: #f1f3f4; color: #5f6368; text-align: center; padding: 14px; border-radius: 30px; font-size: 0.9rem; }
        .ios-guide { font-size: 0.8rem; color: #70757a; background: #f8f9fa; padding: 10px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- PWA Modals -->
    <div class="modal-overlay" id="modal-overlay"></div>
    <div id="install-modal">
        <div class="install-header">
            <div class="install-icon">RDO</div>
            <div class="install-content">
                <h3>安裝 RDO App</h3>
                <p>安裝後即可離線使用，獲得流暢體驗。</p>
            </div>
        </div>
        <div class="install-footer">
            <button class="btn-install-secondary" onclick="closeInstallModal()">稍後再說</button>
            <button class="btn-install-main" id="confirm-install-btn">立即安裝</button>
        </div>
        <div id="ios-hint" class="ios-guide" style="display:none;">
            💡 <b>iOS 使用者：</b>請點擊下方「分享」圖示，然後選擇「加入主畫面」。
        </div>
    </div>

    <h1 style="text-align: center; color: #202124;">RDO 配對抽籤系統 V8</h1>

    <div id="admin-section" class="section" style="display: none; border: 2px solid #1a73e8;">
        <h3 style="color: #d93025;">1. 管理者設定 (本次系統配額)</h3>
        <div id="quota-inputs"></div>
        <div class="btn-group">
            <button class="btn-save" onclick="saveQuotas()">儲存配額設定</button>
            <button class="btn-reset" onclick="resetAll()">全部重置系統 (清除所有資料)</button>
        </div>
    </div>

    <button class="btn-toggle-admin" onclick="toggleAdmin()">⚙️ 顯示/隱藏管理者設定</button>

    <div class="parallel-container">
        <div class="section">
            <h3 style="color: #34a853;">2. 申請人抽籤</h3>
            <input type="text" id="applicant-name" placeholder="請輸入您的姓名" style="width: 100%; box-sizing: border-box; font-size: 1.1em;">
            <button class="btn-draw" onclick="performDraw()">點擊抽籤</button>
            <p id="msg" class="error"></p>
        </div>
        <div class="section">
            <h3 >3. 目前配額剩餘狀況 (即時)</h3>
            <div id="status-display"></div>
        </div>
    </div>

    <div class="section">
        <h3 style="color: #5f6368;">4. 紀錄區塊</h3>
        <div class="btn-group">
            <button class="btn-export" onclick="exportCSV()">下載本次 CSV</button>
            <!-- ✨ 修復關鍵：放寬 accept 條件，增加 text/plain 和 excel 支援 ✨ -->
            <button class="btn-import" onclick="importCSVTrigger()">匯入 CSV 歷史紀錄</button>
            <button class="btn-clear-history" onclick="clearImportedHistory()">清除匯入的歷史紀錄</button>
        </div>
        <input type="file" id="csv-import-input" style="display: none;" accept=".csv, text/csv, application/vnd.ms-excel, text/plain" onchange="handleCSVImport(event)">
        
        <span class="table-title">【本次抽籤紀錄】</span>
        <table class="log-table">
            <thead ><tr><th>姓名</th><th>抽中配對</th><th>時間</th></tr></thead>
            <tbody id="log-body"></tbody>
        </table>

        <span class="table-title" style="margin-top: 40px;">【匯入的歷史紀錄】</span>
        <table class="log-table" style="background-color: #fafafa;">
            <thead><tr><th>姓名</th><th>抽中配對</th><th>時間</th></tr></thead>
            <tbody id="imported-log-body"></tbody>
        </table>
    </div>

    <div class="section override-section">
        <h3 style="color: #d93025;">⚠️ 管理者強制覆蓋 (Manual Override)</h3>
        <div class="override-controls">
            <div><label>申請人姓名</label><input type="text" id="override-name" placeholder="輸入姓名"></div>
            <div><label>強制指定配對</label><select id="override-pair"></select></div>
            <div class="full-width"><label>管理員密碼</label><input type="password" id="override-password" placeholder="輸入密碼以執行"></div>
            <div class="full-width"><button class="btn-override" onclick="performManualOverride()">執行強制配對</button></div>
        </div>
        <p id="override-msg" class="error"></p>
    </div>

    <script>
        const ADMIN_PASSWORD = "admin123"; 
        const pairList = [
            ["週一", "週二"], ["週二", "週三"], ["週三", "週四"], 
            ["週四", "週五"], ["週五", "週六"], ["週六", "週日"], ["週日", "週一"]
        ];

        let appData = { quotas: {}, currentUsage: {}, logs: [], importedLogs: [] };

        pairList.forEach(pair => {
            const key = `${pair[0]}-${pair[1]}`;
            appData.quotas[key] = 0;
            appData.currentUsage[key] = 0;
        });

        function toggleAdmin() {
            const adminSection = document.getElementById('admin-section');
            adminSection.style.display = (adminSection.style.display === "none") ? "block" : "none";
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('rdo_system_v8');
            if (saved) { appData = JSON.parse(saved); }
            initInterface();
            updateUI();
        }

        function saveToStorage() {
            localStorage.setItem('rdo_system_v8', JSON.stringify(appData));
        }

        function initInterface() {
            const quotaDiv = document.getElementById('quota-inputs');
            quotaDiv.innerHTML = "";
            pairList.forEach(pair => {
                const key = `${pair[0]}-${pair[1]}`;
                quotaDiv.innerHTML += `<div class="day-row"><span>${pair[0]} & ${pair[1]} 配額:</span><input type="number" id="q-${key}" value="${appData.quotas[key] || 0}" min="0" style="width: 80px;"></div>`;
            });

            const overrideSelect = document.getElementById('override-pair');
            overrideSelect.innerHTML = "";
            pairList.forEach(pair => {
                const key = `${pair[0]}-${pair[1]}`;
                const option = document.createElement('option');
                option.value = key;
                option.textContent = `${pair[0]} & ${pair[1]}`;
                overrideSelect.appendChild(option);
            });
        }

        function saveQuotas() {
            pairList.forEach(pair => {
                const key = `${pair[0]}-${pair[1]}`;
                appData.quotas[key] = parseInt(document.getElementById(`q-${key}`).value) || 0;
            });
            saveToStorage();
            updateUI();
            alert("配額設定已更新！");
            document.getElementById('admin-section').style.display = "none";
        }

        function performDraw() {
            const nameInput = document.getElementById('applicant-name');
            const name = nameInput.value.trim();
            const msg = document.getElementById('msg');
            msg.className = "error"; msg.innerText = "";
            if (!name) { msg.innerText = "錯誤：請輸入姓名！"; return; }
            if (appData.logs.some(log => log.name.trim() === name)) { msg.innerText = `錯誤：${name} 已經參與過了！`; return; }

            let availableKeys = Object.keys(appData.quotas).filter(key => appData.currentUsage[key] < appData.quotas[key]);
            if (availableKeys.length === 0) { msg.innerText = "抽籤失敗：名額已滿！"; return; }

            const userPastPairs = appData.importedLogs.filter(log => log.name.trim() === name).map(log => log.pair);
            availableKeys = availableKeys.filter(key => !userPastPairs.includes(key.replace(/-/g, ' & ')));

            if (availableKeys.length === 0) { msg.innerText = `抽籤失敗：您目前沒有可抽取的剩餘配對！`; return; }

            const winningKey = availableKeys[Math.floor(Math.random() * availableKeys.length)];
            const pairNames = winningKey.split('-');
            appData.currentUsage[winningKey]++;
            appData.logs.push({ name: name, pair: `${pairNames[0]} & ${pairNames[1]}`, timestamp: new Date().toLocaleString() });
            saveToStorage(); updateUI();
            msg.className = "success";
            msg.innerHTML = `🎉 恭喜 <strong>${name}</strong>！<br>抽中日期：${pairNames[0]} & ${pairNames[1]}`;
            nameInput.value = "";
        }

        function performManualOverride() {
            const name = document.getElementById('override-name').value.trim();
            const pairKey = document.getElementById('override-pair').value;
            const password = document.getElementById('override-password').value;
            const msg = document.getElementById('override-msg');
            if (password !== ADMIN_PASSWORD) { msg.className = "error"; msg.innerText = "錯誤：密碼不正確！"; return; }
            if (!name) { msg.className = "error"; msg.innerText = "錯誤：請輸入姓名！"; return; }
            const pairNames = pairKey.split('-');
            appData.currentUsage[pairKey]++;
            appData.logs.push({ name: name, pair: `${pairNames[0]} & ${pairNames[1]}`, timestamp: `[強制] ${new Date().toLocaleString()}` });
            saveToStorage(); updateUI();
            msg.className = "success";
            msg.innerHTML = `✅ 強制配對完成！`;
            document.getElementById('override-name').value = "";
            document.getElementById('override-password').value = "";
        }

        function updateUI() {
            const statusDiv = document.getElementById('status-display');
            let statusHtml = "";
            pairList.forEach(pair => {
                const key = `${pair[0]}-${pair[1]}`;
                const remaining = appData.quotas[key] - appData.currentUsage[key];
                const exhaustionClass = remaining <= 0 ? ' quota-exhausted' : '';
                statusHtml += `<div class="day-row"><span>${pair[0]} & ${pair[1]}</span><span class="status-item${exhaustationClass}">${appData.currentUsage[key]} / ${appData.quotas[key]} (剩 ${remaining})</span></div>`;
            });
            statusDiv.innerHTML = statusHtml;
            const logBody = document.getElementById('log-body');
            logBody.innerHTML = "";
            [...appData.logs].reverse().forEach(log => { logBody.innerHTML += `<tr><td>${log.name}</td><td>${log.pair}</td><td>${log.timestamp}</td></tr>`; });
            const impLogBody = document.getElementById('imported-log-body');
            impLogBody.innerHTML = "";
            [...appData.importedLogs].reverse().forEach(log => { impLogBody.innerHTML += `<tr><td>${log.name}</td><td>${log.pair}</td><td>${log.timestamp}</td></tr>`; });
        }

        function exportCSV() {
            if (appData.logs.length === 0) return alert("沒有紀錄");
            let csvContent = "\ufeff姓名,抽中配對,時間\n";
            appData.logs.forEach(log => { csvContent += `"${log.name}","${log.pair}","${log.timestamp}"\n`; });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url; a.download = 'rdo_session.csv'; a.click();
        }

        function importCSVTrigger() { document.getElementById('csv-import-input').click(); }
        
        // ✨ 優化後的匯入處理 ✨
        function handleCSVImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const lines = text.split(/\r?\n/);
                const newImportedLogs = [];
                
                const parseCSVLine = (line) => {
                    const result = [];
                    let current = '';
                    let inQuotes = false;
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === '"') {
                            if (inQuotes && line[i+1] === '"') { current += '"'; i++; } 
                            else { inQuotes = !inQuotes; }
                        } else if (char === ',' && !inQuotes) { result.push(current); current = ''; } 
                        else { current += char; }
                    }
                    result.push(current);
                    return result;
                };

                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    const parts = parseCSVLine(line);
                    if (parts.length >= 3) {
                        newImportedLogs.push({ name: parts[0].trim(), pair: parts[1].trim(), timestamp: parts[2].trim() });
                    }
                }
                appData.importedLogs = [...appData.importedLogs, ...newImportedLogs];
                saveToStorage(); updateUI();
                alert(`成功匯入 ${newImportedLogs.length} 筆紀錄！`);
            };
            reader.readAsText(file);
            event.target.value = "";
        }

        function clearImportedHistory() { if (confirm("確定清除匯入紀錄？")) { appData.importedLogs = []; saveToStorage(); updateUI(); } }

        function resetAll() {
            const password = prompt("請輸入管理者密碼：");
            if (password === ADMIN_PASSWORD) {
                if (confirm("確定要徹底重置系統？")) { localStorage.removeItem('rdo_system_v8'); location.reload(); }
            } else if (password !== null) { alert("密碼錯誤"); }
        }

        // PWA Logic
        let deferredPrompt;
        const installModal = document.getElementById('install-modal');
        const modalOverlay = document.getElementById('modal-overlay');
        const confirmInstallBtn = document.getElementById('confirm-install-btn');
        const iosHint = document.getElementById('ios-hint');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            if (isIOS) { iosHint.style.display = 'block'; }
            setTimeout(() => {
                installModal.classList.add('active');
                modalOverlay.classList.add('active');
            }, 2000);
        });

        confirmInstallBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(res => { if(res.outcome === 'accepted') closeInstallModal(); });
            } else {
                alert("請點擊瀏覽器選單中的『新增至主畫面』來安裝。");
                closeInstallModal();
            }
        });

        function closeInstallModal() {
            installModal.classList.remove('active');
            modalOverlay.classList.remove('active');
            localStorage.setItem('rdo_install_dismissed', 'true');
        }

        window.addEventListener('appinstalled', () => { closeInstallModal(); });
        loadFromStorage();
    </script>
</body>
</html>
